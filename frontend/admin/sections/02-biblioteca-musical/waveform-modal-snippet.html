<!-- ============================================================
   ÓNIX FM — Waveform Editor: Fragmento HTML para el Modal de Carga
   ================================================================
   INSTRUCCIONES DE INTEGRACIÓN:
   1. Copia este bloque dentro de tu modal de subida en
      biblioteca-musical.html, justo DESPUÉS del dropzone y
      ANTES del formulario de metadatos.
   2. Añade los <script> de WaveSurfer ANTES de admin-app.js (ver abajo).
   3. Añade <link rel="stylesheet" href="waveform-editor.css"> en <head>.
   ============================================================ -->

<!-- ── Waveform Panel ─────────────────────────────────────────────────────── -->
<div id="waveform-panel" class="waveform-panel" style="display:none;"
     aria-label="Editor de frecuencia de audio">

  <!-- Barra superior: título + nombre del archivo + controles -->
  <div class="wf-header">
    <div class="wf-header-left">
      <span class="wf-title">〰 Editor de Frecuencia</span>
      <span id="wf-filename" class="wf-filename"></span>
    </div>
    <div class="wf-header-right">
      <!-- Play / Pausa para pre-escucha del DJ -->
      <button id="wf-btn-play" type="button" class="wf-btn wf-btn-play"
              title="Play / Pausa (pre-escucha)" aria-label="Play / Pausa">
        <svg id="wf-play-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>

      <!-- Posición actual / duración total -->
      <span id="wf-time-display" class="wf-time-display">0:00 / 0:00</span>

      <!-- Reiniciar marcadores a posiciones calculadas automáticamente -->
      <button id="wf-btn-reset" type="button" class="wf-btn wf-btn-ghost"
              title="Reiniciar marcadores a posiciones por defecto">
        ↺ Reset
      </button>
    </div>
  </div>

  <!-- Zona de la onda + overlay de carga -->
  <div class="wf-canvas-wrapper">
    <!-- WaveSurfer inyecta su canvas aquí automáticamente -->
    <div id="waveform"></div>

    <!-- Visible mientras WaveSurfer decodifica el MP3.
         Se oculta con la clase .hidden al dispararse el evento 'ready'. -->
    <div id="wf-loading" class="wf-loading">
      <div class="wf-spinner"></div>
      <span>Analizando audio…</span>
    </div>
  </div>

  <!-- Leyenda de colores de regiones -->
  <div class="wf-regions-legend">
    <span class="wf-legend-item wf-legend-intro">
      <span class="wf-legend-dot"></span>Intro
    </span>
    <span class="wf-legend-item wf-legend-outro">
      <span class="wf-legend-dot"></span>Outro / Mix-out
    </span>
    <span class="wf-legend-item wf-legend-hook">
      <span class="wf-legend-dot"></span>Hook
    </span>
    <span class="wf-legend-hint">
      Clic en la onda → saltar · Arrastra los marcadores para ajustar
    </span>
  </div>

  <!-- Las tres tarjetas de marcadores -->
  <div class="wf-markers-row">

    <!-- INTRO: dónde arranca realmente la canción tras el silencio inicial -->
    <div class="wf-marker-card wf-marker-intro">
      <div class="wf-marker-label">
        <span class="wf-marker-dot wf-dot-intro"></span>INTRO
      </div>
      <div class="wf-time-field">
        <label for="input-intro">Tiempo</label>
        <!--
          name="intro" es el campo que FormData envía al POST /api/v1/audios.
          api_server.py ya espera: intro: Optional[float] = Form(None)
        -->
        <input type="number" id="input-intro" name="intro"
               class="wf-input" step="0.1" min="0" value=""
               placeholder="0.0" autocomplete="off" />
        <span class="wf-unit">seg</span>
      </div>
      <button type="button" class="wf-set-btn" data-region="intro"
              title="Guardar posición actual del cursor como punto de Intro">
        📍 Marcar posición actual
      </button>
    </div>

    <!-- OUTRO: punto donde comienza el fundido de salida (crossfade) -->
    <div class="wf-marker-card wf-marker-outro">
      <div class="wf-marker-label">
        <span class="wf-marker-dot wf-dot-outro"></span>OUTRO / MIX-OUT
      </div>
      <div class="wf-time-field">
        <label for="input-outro">Tiempo</label>
        <input type="number" id="input-outro" name="outro"
               class="wf-input" step="0.1" min="0" value=""
               placeholder="0.0" autocomplete="off" />
        <span class="wf-unit">seg</span>
      </div>
      <button type="button" class="wf-set-btn" data-region="outro"
              title="Guardar posición actual del cursor como punto de Outro">
        📍 Marcar posición actual
      </button>
    </div>

    <!-- HOOK: el gancho musical, el momento más memorable de la canción -->
    <div class="wf-marker-card wf-marker-hook">
      <div class="wf-marker-label">
        <span class="wf-marker-dot wf-dot-hook"></span>HOOK
      </div>
      <div class="wf-time-field">
        <label for="input-hook">Tiempo</label>
        <input type="number" id="input-hook" name="hook"
               class="wf-input" step="0.1" min="0" value=""
               placeholder="0.0" autocomplete="off" />
        <span class="wf-unit">seg</span>
      </div>
      <button type="button" class="wf-set-btn" data-region="hook"
              title="Guardar posición actual del cursor como Hook">
        📍 Marcar posición actual
      </button>
    </div>

  </div>
</div>
<!-- ── Fin Waveform Panel ──────────────────────────────────────────────────── -->


<!--
  ================================================================
  SCRIPTS — Añadir en <head> o justo antes de </body>, ANTES de admin-app.js
  ================================================================

  OPCIÓN A — CDN UMD (funciona sin bundler, para proyectos estáticos):
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

    import RegionsPlugin from 'https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.esm.js'
  ================================================================
